name: Синхронизация каталога из прайса

on:
  workflow_dispatch:        # запуск вручную кнопкой
  push:                     # запуск при изменении самого робота (для проверки)
    paths:
      - '.github/workflows/sync-catalog.yml'
      - 'scripts/sync-catalog.mjs'
  # schedule:               # включу после валидации превью
  #   - cron: '0 * * * *'   # каждый час

permissions:
  contents: write

concurrency:
  group: sync-catalog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Собрать превью каталога из прайса
        run: node scripts/sync-catalog.mjs      # без WRITE=1 => режим превью

      - name: Закоммитить превью (если изменилось)
        run: |
          git config user.name  "sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/_sync_preview.json data/_sync_summary.txt
          if git diff --cached --quiet; then
            echo "Изменений в превью нет."
          else
            git commit -m "[bot] превью синхронизации каталога"
            git push
          fi
